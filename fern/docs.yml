# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

title: "RMM"
instances:
  - url: "nvidia-rmm.docs.buildwithfern.com/rmm"
    custom-domain: docs.nvidia.com/rmm
colors:
  accentPrimary:
    light: "#2F4B00"
    dark: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"
check:
  rules:
    broken-links: "error"
layout:
  searchbar-placement: "header"
  page-width: "1376px"
  sidebar-width: "248px"
  content-width: "812px"
  tabs-placement: "header"
  hide-feedback: true
theme:
  page-actions: "toolbar"
  footer-nav: "minimal"
experimental:
  basepath-aware: true
navbar-links:
  - type: "secondary"
    text: "GitHub"
    url: "https://github.com/rapidsai/rmm"
  - type: "secondary"
    text: "CUDA-X"
    url: "https://www.nvidia.com/en-us/technologies/cuda-x/"
navigation:
  - page: "Home"
    path: "./pages/index.md"
  - page: "User Guide"
    path: "./pages/user_guide/guide.md"
  - section: "API Reference"
    contents:
      - page: "C++ API"
        path: "./pages/api_reference/cpp.md"
      - page: "Python API"
        path: "./pages/api_reference/python.md"
